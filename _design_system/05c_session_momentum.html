<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_motion | Sessão - Momentum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 900: '#0f172a' },
                        impulse: { 500: '#f97316', 600: '#ea580c' },
                        commercial: { 600: '#434ca5', 800: '#262b66', 900: '#191d4e' }
                    },
                    boxShadow: { 'momentum': '0 20px 40px -15px rgba(67, 76, 165, 0.15)' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex justify-center pb-12">
    <main class="w-full max-w-md bg-white relative min-h-screen border-x border-slate-100 flex flex-col shadow-2xl">
        
        <header class="px-6 py-6 flex justify-between items-center z-10 sticky top-0 bg-white/80 backdrop-blur-xl border-b border-slate-50">
            <h1 class="font-bold tracking-widest text-slate-400 text-xs uppercase">Ritmo Atual</h1>
            <button class="w-10 h-10 rounded-full bg-slate-50 text-slate-500 hover:text-commercial-900 transition-colors flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </header>

        <div class="px-6 flex flex-col flex-1 pb-32">
            
            <section class="mt-8 mb-10 text-center relative">
                <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-commercial-600/5 rounded-full blur-3xl -z-10"></div>

                <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-50 rounded-full mb-6">
                    <span class="w-2 h-2 rounded-full bg-commercial-600 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-commercial-900 uppercase tracking-widest">Sessão</span>
                </div>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight leading-tight mb-2">Mobilidade<br><span class="text-commercial-600">Dinâmica</span></h2>
                <p class="text-slate-500 font-medium text-sm mt-3 w-[85%] mx-auto leading-relaxed">Ciclo ininterrupto de mobilidade e tração constante.</p>
            </section>

            <section class="flex-1">
                <div class="relative">
                    
                    <div class="bg-commercial-900 rounded-[2rem] p-8 shadow-momentum relative overflow-hidden text-white z-10">
                        <div class="absolute -right-12 -bottom-12 w-40 h-40 bg-commercial-600 rounded-full blur-2xl opacity-40"></div>
                        <div class="absolute top-6 right-6">
                            <span class="flex h-3 w-3 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-impulse-500 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-impulse-500"></span>
                            </span>
                        </div>

                        <span class="text-xs uppercase tracking-widest text-commercial-400 font-bold block mb-4">Bloco Atual</span>
                        <h4 class="text-2xl font-extrabold mb-3">Expansão de Cintura</h4>
                        <p class="text-commercial-100 font-medium text-sm leading-relaxed mb-6">Foca-te na fluidez lateral e na não quebra do compasso.</p>
                        
                        <div class="flex items-center gap-3">
                            <div class="w-full bg-commercial-800 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-impulse-500 w-1/3 h-full rounded-full"></div>
                            </div>
                            <span class="text-xs font-bold text-impulse-500">Continuar</span>
                        </div>
                    </div>

                    <div class="absolute left-10 -bottom-12 w-0.5 h-16 bg-gradient-to-b from-commercial-900 to-slate-200 -z-10"></div>

                    <div class="mt-8 pt-8 px-6 flex items-start gap-5">
                        <div class="w-10 h-10 rounded-full bg-slate-50 border-2 border-slate-200 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                        </div>
                        <div>
                            <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold block mb-1">Janela Seguinte</span>
                            <h4 class="text-lg font-extrabold text-slate-800">Círculos de Base</h4>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent pt-12 z-20">
            <button class="w-full bg-impulse-500 text-white font-extrabold text-base py-5 rounded-[1.5rem] shadow-[0_15px_30px_-10px_rgba(249,115,22,0.4)] flex justify-center items-center gap-2 hover:bg-impulse-600 transition-colors">
                Continuar
                <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
            </button>
        </div>

    </main>
</body>
</html>
