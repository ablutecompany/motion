<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_motion | Perfil - Momentum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 900: '#0f172a' },
                        impulse: { 500: '#f97316', 600: '#ea580c' },
                        commercial: { 600: '#434ca5', 900: '#23285c' }
                    },
                    boxShadow: { 'momentum': '0 20px 40px -15px rgba(67, 76, 165, 0.15)' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex justify-center pb-12">
    <main class="w-full max-w-md bg-slate-50 relative min-h-screen border-x border-slate-100 flex flex-col shadow-2xl overflow-hidden">
        
        <header class="px-6 pt-12 pb-10 flex flex-col items-center justify-center text-center z-10 bg-white shadow-sm border-b border-slate-100 relative rounded-b-[3rem]">
            <div class="absolute top-0 right-0 w-64 h-64 bg-commercial-600/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
            
            <div class="w-20 h-20 rounded-[1.5rem] bg-white shadow-momentum overflow-hidden mb-5 border-2 border-white">
                <img src="https://i.pravatar.cc/150?u=momentum1" alt="Avatar" class="w-full h-full object-cover">
            </div>
            
            <h1 class="text-2xl font-extrabold text-slate-900 mb-1">Hugo Silva</h1>
            <div class="flex items-center gap-1.5 text-slate-500">
                <span class="w-1.5 h-1.5 rounded-full bg-commercial-600"></span>
                <span class="text-xs font-bold uppercase tracking-widest">Identidade Local</span>
            </div>
            
            <button class="absolute top-6 right-6 w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:text-commercial-600 transition-colors flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </header>

        <div class="px-6 flex flex-col flex-1 py-8 gap-8 z-10">
            
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-2">Modo Atual</h2>
                </div>
                
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-1 p-2">
                    
                    <button class="w-full text-left p-4 rounded-[1.5rem] hover:bg-slate-50 transition-colors flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-500 group-hover:text-commercial-600 transition-colors">Tensão e Recuperação</span>
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4 text-commercial-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </button>
                    
                    <button class="w-full text-left p-4 rounded-[1.5rem] hover:bg-slate-50 transition-colors flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-500 group-hover:text-commercial-600 transition-colors">Precisão Tática</span>
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4 text-commercial-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </button>

                    <div class="w-full text-left p-5 bg-commercial-900 rounded-[1.5rem] shadow-momentum flex items-center justify-between relative overflow-hidden text-white mt-1">
                        <div class="absolute right-0 top-0 w-24 h-24 bg-commercial-600 rounded-full blur-2xl opacity-40 translate-x-10 -translate-y-10"></div>
                        <div>
                            <span class="text-[10px] font-bold text-commercial-400 uppercase tracking-widest block mb-1">Selecionado</span>
                            <span class="text-lg font-extrabold block">Fluxo Contínuo</span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center shadow-inner">
                            <div class="w-3 h-3 rounded-full bg-impulse-500 animate-pulse"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6">
                    <div class="flex items-center justify-between mb-6 pb-6 border-b border-slate-50">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Consistência Diária</span>
                            <span class="text-base font-extrabold text-slate-900">Percurso ativo há 14 dias sem quebras.</span>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center">
                            <svg class="w-5 h-5 text-commercial-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Localização Operacional</span>
                            <span class="text-base font-extrabold text-slate-900">Ginásio</span>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center">
                            <svg class="w-5 h-5 text-commercial-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>
</body>
</html>
