<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_motion | Perfil - Performance Boost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                    colors: {
                        navy: { 900: '#060a11', 800: '#0b1323', 700: '#131c2b', 600: '#1c283a' },
                        cyan: { glow: '#00e5ff', muted: '#00e5ff99' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-navy-900 text-slate-300 font-sans antialiased min-h-screen flex justify-center pb-12">
    <main class="w-full max-w-md bg-navy-800 relative min-h-screen flex flex-col shadow-2xl border-x border-navy-700">
        
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 24px 24px;"></div>

        <header class="px-6 pt-10 pb-6 border-b border-navy-700 z-10 flex items-center justify-between bg-navy-900/80 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-14 h-14 bg-navy-700 border border-cyan-glow/50 rounded flex items-center justify-center p-0.5">
                        <img src="https://i.pravatar.cc/150?u=perf2" alt="Avatar" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-cyan-glow border-2 border-navy-900 rounded-full animate-pulse"></div>
                </div>
                <div>
                    <span class="text-[10px] font-mono tracking-widest text-slate-500 uppercase block mb-0.5">Contexto Operacional</span>
                    <h1 class="text-xl font-black text-white uppercase tracking-wider">Hugo Silva</h1>
                </div>
            </div>
            
            <button class="w-10 h-10 border border-navy-600 rounded bg-navy-800 flex items-center justify-center text-slate-400 hover:text-cyan-glow hover:border-cyan-glow transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </header>

        <div class="px-6 flex flex-col flex-1 py-8 gap-6 z-10">
            
            <section>
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-1 h-3 bg-cyan-glow"></div>
                    <span class="text-[10px] font-mono text-cyan-glow tracking-[0.2em] uppercase">Modo Atual</span>
                </div>
                
                <div class="flex flex-col border border-navy-600 bg-navy-900 rounded">
                    
                    <div class="p-5 border-l-4 border-cyan-glow bg-cyan-glow/5 relative overflow-hidden">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-cyan-glow/20">
                            <span class="font-mono text-4xl block font-black">✔</span>
                        </div>
                        <span class="text-[10px] font-mono tracking-widest text-cyan-glow uppercase block mb-1">Módulo Primário</span>
                        <h3 class="text-xl font-bold text-white uppercase tracking-wider">Desempenho<br>Tático</h3>
                    </div>

                    <button class="p-4 border-t border-navy-700 bg-navy-800 hover:bg-navy-700 transition-colors text-left flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-400 uppercase tracking-widest group-hover:text-white">Estabilização Orgânica</span>
                        <svg class="w-4 h-4 text-navy-500 group-hover:text-cyan-glow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>

                    <button class="p-4 border-t border-navy-700 bg-navy-800 hover:bg-navy-700 transition-colors text-left flex items-center justify-between group">
                        <span class="text-sm font-bold text-slate-400 uppercase tracking-widest group-hover:text-white">Motor Contínuo</span>
                        <svg class="w-4 h-4 text-navy-500 group-hover:text-cyan-glow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>

                </div>
            </section>

            <section class="mt-2">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-navy-900 border border-navy-700 p-5 rounded aspect-square flex flex-col justify-between cursor-default">
                        <span class="text-[10px] font-mono tracking-[0.2em] text-slate-500 uppercase block">Execução</span>
                        <div class="w-10 h-10 border border-navy-600 flex items-center justify-center text-cyan-glow mb-2">
                            <span class="text-lg font-black block">_</span>
                        </div>
                        <h4 class="text-lg font-black text-white uppercase leading-none">Alta<br>Intensidade</h4>
                    </div>

                    <div class="bg-navy-900 border border-navy-700 p-5 rounded aspect-square flex flex-col justify-between cursor-default relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 w-20 h-20 bg-navy-800 rounded-full border border-navy-600"></div>
                        <span class="text-[10px] font-mono tracking-[0.2em] text-slate-500 uppercase block">Ambiente</span>
                        <h4 class="text-lg font-black text-slate-300 uppercase leading-tight relative mt-auto">Estrutura<br>Interior</h4>
                    </div>
                </div>
            </section>

        </div>
    </main>
</body>
</html>
