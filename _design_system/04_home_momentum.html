<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_motion | Home - Momentum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 900: '#0f172a' },
                        impulse: { 500: '#f97316', 600: '#ea580c' },
                        commercial: { 600: '#434ca5', 900: '#23285c' }
                    },
                    boxShadow: { 'momentum': '0 20px 40px -15px rgba(67, 76, 165, 0.15)' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex justify-center pb-12">
    <main class="w-full max-w-md bg-slate-50 relative flex flex-col min-h-screen overflow-hidden ring-1 ring-slate-200">
        
        <header class="px-6 pt-12 pb-6 flex justify-between items-center z-10">
            <div class="w-10 h-10 rounded-xl bg-white shadow-sm overflow-hidden flex-shrink-0">
                <img src="https://i.pravatar.cc/100?u=momentum" alt="User" class="w-full h-full object-cover">
            </div>
            <h1 class="font-bold tracking-widest text-slate-900 text-sm italic pr-2">_MOTION</h1>
        </header>

        <div class="absolute top-0 right-0 w-96 h-96 bg-commercial-600/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>

        <div class="px-6 flex flex-col gap-8 pb-20 z-10">
            
            <!-- Hero (Indicator: Strong Momentum Percentage Evolution) -->
            <section class="mt-4">
                <div class="inline-flex items-center gap-3 mb-6">
                    <span class="w-2 h-2 rounded-full bg-impulse-500"></span>
                    <span class="text-xs font-bold text-commercial-900 uppercase tracking-widest">Tração Confirmada</span>
                </div>
                <h2 class="text-5xl font-extrabold text-slate-900 tracking-tight leading-none mb-6">Em Foco<br><span class="text-commercial-600">Ascendente</span></h2>
                
                <!-- Hero Evolution Indicator -->
                <div class="flex items-center gap-4 bg-white shadow-sm border border-slate-100 p-4 rounded-2xl mb-4">
                    <div class="text-3xl font-extrabold text-impulse-500">+100%</div>
                    <div>
                        <span class="block text-[10px] font-bold uppercase tracking-widest text-slate-400">Evolução do Ciclo</span>
                        <p class="text-sm font-medium text-slate-700 leading-tight">Passaste de 2 para 4 sessões esta semana.</p>
                    </div>
                </div>

                <p class="text-slate-500 font-medium text-sm leading-relaxed">Já não estás só a começar. O teu percurso está a ganhar tração sólida e rítmica.</p>
            </section>

            <!-- Action Area -->
            <section class="flex flex-col gap-4">
                
                <button class="w-full text-left bg-white rounded-[2rem] p-8 shadow-momentum border border-white/50 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 p-8">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:bg-impulse-500 transition-all duration-500">
                            <svg class="w-6 h-6 text-commercial-900 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                    
                    <span class="text-xs uppercase tracking-widest text-impulse-500 font-bold block mb-12">Avançar</span>
                    <h3 class="text-3xl font-extrabold text-slate-900 mb-2">Sessão</h3>
                    <p class="text-slate-500 font-medium text-sm w-[70%]">Continuar o fluxo e o ritmo que começaste a consolidar.</p>
                </button>

                <button class="w-full text-left bg-slate-100 rounded-[1.5rem] p-6 relative overflow-hidden group hover:bg-slate-200 transition-colors flex items-center justify-between">
                    <div>
                        <span class="text-[10px] uppercase tracking-widest text-commercial-600 font-bold block mb-1">Passos Seguintes</span>
                        <h3 class="text-xl font-extrabold text-slate-900">Plano Atual</h3>
                        <p class="text-xs text-slate-500 font-medium mt-1">Ver a próxima sequência e manter o avanço.</p>
                    </div>
                </button>

            </section>
        </div>
    </main>
</body>
</html>
